<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<style>

body{
    background:#222;
    padding:30px;
    font-family:Arial, sans-serif;
}


/* F1车手标签 */

.driver-tag{

    display:inline-flex;

    align-items:center;

    height:36px;

    padding:0 12px;

    margin:8px;

    border-radius:6px;

    color:white;

    font-weight:900;

    letter-spacing:1px;

    font-size:18px;

}


/* 号码 */

.number{

    margin-left:4px;

    opacity:.65;

    font-size:16px;

}


/* 车队颜色 */

.mclaren{
    background:#FF8700;
}


.redbull{
    background:#3671C6;
}


.ferrari{
    background:#E8002D;
}


.mercedes{
    background:#00D2BE;
    color:#111;
}


.aston{
    background:#006F62;
}


.alpine{
    background:#0090FF;
}


.williams{
    background:#005AFF;
}


.audi{
    background:#888888;
}


.cadillac{
    background:#111111;
}


.haas{
    background:#B6BABD;
    color:#111;
}


.racingbulls{
    background:#6692FF;
}



</style>

</head>


<body>


<!-- McLaren -->

<div class="driver-tag mclaren">
PIA<span class="number">81</span>
</div>

<div class="driver-tag mclaren">
NOR<span class="number">1</span>
</div>


<!-- Red Bull -->

<div class="driver-tag redbull">

</div>

<div class="driver-tag redbull">

</div>

</div>

</div>

</div>

<div class="driver-tag aston">

</body>

</html>
